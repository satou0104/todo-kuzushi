<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>todo崩し</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- ヘッダー -->
    <header id="header">
      <!-- セグメントコントロール -->
      <div id="segment-control">
        <button class="seg-btn active" data-mode="todo">TODO</button>
        <button class="seg-btn" data-mode="break">BREAK</button>
        <button class="seg-btn" data-mode="invader">INVADER</button>
      </div>
    </header>

    <!-- TODOモード -->
    <div id="todo-mode">
      <ul id="todo-list"></ul>
    </div>

    <!-- BREAKモード（ブロック崩し） -->
    <div id="game-mode" class="hidden">
      <canvas id="game-canvas"></canvas>
      <div id="game-overlay" class="hidden">
        <div id="overlay-content">
          <p id="overlay-title"></p>
          <p id="overlay-sub"></p>
          <p id="overlay-score" class="hidden"></p>
          <button id="overlay-btn" class="hidden">もう一度</button>
        </div>
      </div>
      <div id="score-display">SCORE: <span id="score-value">0</span></div>
    </div>

    <!-- 保存確認ダイアログ（全モード共通） -->
    <div id="save-dialog" class="hidden">
      <div id="save-dialog-box">
        <p id="save-dialog-title">倒したタスクを<br>完了にしますか？</p>
        <div id="save-dialog-btns">
          <button id="save-no-btn">NO</button>
          <button id="save-yes-btn">YES</button>
        </div>
      </div>
    </div>

    <!-- INVADERモード -->
    <div id="invader-mode" class="hidden">
      <canvas id="invader-canvas"></canvas>
      <div id="invader-overlay" class="hidden">
        <div id="invader-overlay-content">
          <p id="invader-overlay-title"></p>
          <p id="invader-overlay-score" class="hidden"></p>
          <button id="invader-overlay-btn">もう一度</button>
        </div>
      </div>
      <div id="invader-score-display">SCORE: <span id="invader-score-value">0</span></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>

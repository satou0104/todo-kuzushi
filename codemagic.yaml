workflows:
  ios-release:
    name: todo崩し iOS Release
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.satou0104.todokuzushi
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.satou0104.todokuzushi"
      xcode: latest
      node: latest
    integrations:
      app_store_connect: codemagic
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Copy web files to www
        script: |
          cp index.html www/index.html
          cp style.css  www/style.css
          cp app.js     www/app.js
      - name: Capacitor sync
        script: |
          npx cap sync ios
      - name: Increment build number
        script: |
          cd ios/App
          agvtool new-version -all $(($(date +%s) / 60))
      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
